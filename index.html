    async function probarConexion() {
        const statusText = document.getElementById('status');
        try {
            const { data, error } = await clienteSupabase.from('citas').select('*');
            
            if (error) {
                statusText.innerText = "Error: " + error.message;
            } else {
                statusText.innerText = "¡Conexión exitosa! Ya tienes " + (data ? data.length : 0) + " citas.";
                console.log("Datos recibidos:", data);
            }
        } catch (err) {
            statusText.innerText = "Error crítico de conexión.";
            console.error(err);
        }
    }

    probarConexion();
