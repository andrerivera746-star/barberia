<script>

    const SUPABASE_URL = 'https://omcmoezotairucnhxsgz.supabase.co';

    // 2. Esta función espera hasta que la librería 'supabase' exista
    function iniciarConexion() {
        if (typeof supabase !== 'undefined') {
            // Si la librería ya cargó, creamos el cliente
            const cliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            probarConexion(cliente);
        } else {
            // Si no, esperamos 200ms y volvemos a intentar
            setTimeout(iniciarConexion, 200);
        }
    }

    async function probarConexion(cliente) {
        const statusText = document.getElementById('status');
        try {
            const { data, error } = await cliente.from('citas').select('*');
            
            if (error) {
                statusText.innerText = "Error: " + error.message;
            } else {
                statusText.innerText = "¡Conexión exitosa! Ya tienes " + (data ? data.length : 0) + " citas.";
                console.log("Datos recibidos:", data);
            }
        } catch (err) {
            statusText.innerText = "Error crítico de conexión.";
            console.error(err);
        }
    }

    // Iniciar el proceso
    iniciarConexion();
</script>
