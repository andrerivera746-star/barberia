<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Barbería App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos para el diseño de tarjetas */
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>
    <h1>Servicios de barbería</h1>
    <p id="status">Cargando servicios...</p>
    
    <div id="servicios-container" class="grid"></div>

    <script>
        const SUPABASE_URL = 'https://omcmoezotairucnhxsgz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tY21vZXpvdGFpcnVjbmh4c2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTQwNjAsImV4cCI6MjA5ODc3MDA2MH0.gjjoUguVLBhylLqBnqJbk-4uIIg0HbW26kujo2O6YBs';

        function conectar() {
            if (window.supabase) {
                const cliente = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                obtenerDatos(cliente);
            } else {
                setTimeout(conectar, 300);
            }
        }

        async function obtenerDatos(cliente) {
            const container = document.getElementById('servicios-container');
            const status = document.getElementById('status');
            const { data } = await cliente.from('citas').select('*');
            
            status.style.display = 'none';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${item.servicio}</h3>
                    <p>Cliente: ${item.cliente_nombre}</p>
                    <p><strong>Precio: $${item.monto}</strong></p>
                `;
                container.appendChild(card);
            });
        }
        conectar();
    </script>
</body>
</html>
