<div id="formulario-citas">
    <input type="text" id="nombre" placeholder="Nombre del cliente">
    <select id="servicio">
        <option value="Corte">Corte de pelo</option>
        <option value="Afeitado">Afeitado</option>
        <option value="Corte y Barba">Corte y Barba</option>
    </select>
    <select id="pago" onchange="toggleYape()">
        <option value="Efectivo">Efectivo</option>
        <option value="Yape">Yape</option>
    </select>
    
    <div id="campo-yape" style="display:none;">
        <input type="text" id="codigo_yape" placeholder="Código de transacción">
    </div>
    
    <input type="time" id="hora">
    <button onclick="guardarCita()">Reservar Cita</button>
</div>

<script>
    function toggleYape() {
        const pago = document.getElementById('pago').value;
        document.getElementById('campo-yape').style.display = (pago === 'Yape') ? 'block' : 'none';
    }

    async function guardarCita() {
        const cita = {
            cliente_nombre: document.getElementById('nombre').value,
            servicio: document.getElementById('servicio').value,
            metodo_pago: document.getElementById('pago').value,
            codigo_yape: document.getElementById('codigo_yape').value,
            hora: document.getElementById('hora').value
        };

        const { data, error } = await window.miCliente.from('citas').insert([cita]);
        if (error) alert("Error: " + error.message);
        else alert("¡Cita guardada con éxito!");
    }
</script>
