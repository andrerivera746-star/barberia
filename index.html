<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Barbería App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Bienvenido a la Barbería</h1>
    <p id="status">Conectando a Supabase...</p>

    <script>
        // 2. Definir credenciales
        const SUPABASE_URL = 'https://omcmoezotairucnhxsgz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tY21vZXpvdGFpcnVjbmh4c2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTQwNjAsImV4cCI6MjA5ODc3MDA2MH0.gjjoUguVLBhylLqBnqJbk-4uIIg0HbW26kujo2O6YBs';

        // 3. Función para inicializar la conexión de forma segura
        function inicializarConexion() {
            // Verificamos si 'supabase' está disponible en el objeto global 'window'
            if (typeof window.supabase !== 'undefined') {
                const cliente = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                ejecutarConsulta(cliente);
            } else {
                // Si aún no carga, esperamos 300ms y reintentamos
                setTimeout(inicializarConexion, 300);
            }
        }

        async function ejecutarConsulta(cliente) {
            const statusText = document.getElementById('status');
            try {
                const { data, error } = await cliente.from('citas').select('*');
                
                if (error) {
                    statusText.innerText = "Error: " + error.message;
                } else {
                    statusText.innerText = "¡Conexión exitosa! Ya tienes " + (data ? data.length : 0) + " citas.";
                }
            } catch (err) {
                statusText.innerText = "Error inesperado de conexión.";
                console.error(err);
            }
        }

        // Iniciar el proceso
        inicializarConexion();
    </script>
</body>
</html>
