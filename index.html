<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Barbería App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Bienvenido a la Barbería</h1>
    <p id="status">Conectando a Supabase...</p>

    <script>
        // 2. Definimos las credenciales
        const SUPABASE_URL = 'https://omcmoezotairucnhxsgz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tY21vZXpvdGFpcnVjbmh4c2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTQwNjAsImV4cCI6MjA5ODc3MDA2MH0.gjjoUguVLBhylLqBnqJbk-4uIIg0HbW26kujo2O6YBs';

        // 3. Función de conexión segura
        function conectar() {
            // Verificamos si Supabase ya existe
            if (window.supabase) {
                const cliente = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // Hacemos la consulta
                cliente.from('citas').select('*').then(({ data, error }) => {
                    if (error) {
                        document.getElementById('status').innerText = "Error: " + error.message;
                    } else {
                        document.getElementById('status').innerText = "¡Conexión exitosa! Citas encontradas: " + data.length;
                        console.log("Datos recibidos:", data);
                        // Hacemos la variable global para que puedas probarla en consola
                        window.miCliente = cliente; 
                    }
                });
            } else {
                // Si aún no carga, esperamos un poquito y reintentamos
                setTimeout(conectar, 300);
            }
        }

        // Ejecutar
        conectar();
    </script>
</body>
</html>
