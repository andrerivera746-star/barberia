    // 2. Función que espera a que la librería 'supabase' exista en el navegador
    function inicializarSupabase() {
        if (window.supabase) {
            const cliente = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            probarConexion(cliente);
        } else {
            console.log("Esperando a que cargue Supabase...");
            setTimeout(inicializarSupabase, 500); // Reintenta cada medio segundo
        }
    }

    async function probarConexion(cliente) {
        const statusText = document.getElementById('status');
        try {
            const { data, error } = await cliente.from('citas').select('*');
            
            if (error) {
                statusText.innerText = "Error: " + error.message;
            } else {
                statusText.innerText = "¡Conexión exitosa! Ya tienes " + (data ? data.length : 0) + " citas.";
                console.log("Datos recibidos:", data);
            }
        } catch (err) {
            statusText.innerText = "Error crítico de conexión.";
            console.error(err);
        }
    }

    // Iniciar el proceso
    inicializarSupabase();
